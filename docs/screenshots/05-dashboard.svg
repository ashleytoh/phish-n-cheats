<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900"><rect width="100%" height="100%" fill="#0b1120"/><rect x="16" y="16" width="1368" height="868" rx="28" fill="#0f172a" stroke="#1f2937"/><rect width="1400" height="72" fill="#101624"/><text x="44" y="45" font-size="28" font-weight="700" fill="#f8fafc">Carouza</text><rect x="1180" y="20" rx="18" width="160" height="34" fill="#193344" stroke="#24566c"/><text x="1260" y="42" text-anchor="middle" font-size="15" fill="#cbd5e1">Sign in</text><text x="72" y="126" font-size="14" fill="#5eead4">Phish n Cheats · Trust &amp; Safety</text><text x="72" y="168" font-size="38" font-weight="800" fill="#f8fafc">Scam intelligence dashboard</text><text x="72" y="200" font-size="18" fill="#94a3b8">What every player reveals about real-world vulnerability — so the platform can prioritise defences.</text><rect x="72" y="232" width="285" height="92" rx="20" fill="#111827" stroke="#334155"/><text x="96" y="278" font-size="32" font-weight="800" fill="#f8fafc">1,284</text><text x="96" y="304" font-size="15" fill="#94a3b8">Plays analysed</text><rect x="377" y="232" width="285" height="92" rx="20" fill="#111827" stroke="#334155"/><text x="401" y="278" font-size="32" font-weight="800" fill="#fb7185">36%</text><text x="401" y="304" font-size="15" fill="#94a3b8">Fell for a scam</text><rect x="682" y="232" width="285" height="92" rx="20" fill="#111827" stroke="#334155"/><text x="706" y="278" font-size="32" font-weight="800" fill="#5eead4">64%</text><text x="706" y="304" font-size="15" fill="#94a3b8">Spotted in time</text><rect x="987" y="232" width="285" height="92" rx="20" fill="#111827" stroke="#334155"/><text x="1011" y="278" font-size="32" font-weight="800" fill="#f8fafc">4.2</text><text x="1011" y="304" font-size="15" fill="#94a3b8">Avg msgs to spot</text><rect x="72" y="352" width="760" height="430" rx="24" fill="#111827" stroke="#334155"/><text x="100" y="390" font-size="24" font-weight="700" fill="#f8fafc">Which scams fool the most people</text><text x="100" y="418" font-size="15" fill="#94a3b8">Share of players who fell for each scam type.</text><text x="100" y="462" font-size="16" fill="#e2e8f0">Urgency / flash sale</text><text x="760" y="462" text-anchor="end" font-size="16" font-weight="700" fill="#fb7185">57%</text><rect x="100" y="476" width="640" height="14" rx="7" fill="#1f2937"/><rect x="100" y="476" width="371" height="14" rx="7" fill="#fb7185"/><text x="100" y="522" font-size="16" fill="#e2e8f0">Phishing payment link</text><text x="760" y="522" text-anchor="end" font-size="16" font-weight="700" fill="#fb7185">47%</text><rect x="100" y="536" width="640" height="14" rx="7" fill="#1f2937"/><rect x="100" y="536" width="301" height="14" rx="7" fill="#fb7185"/><text x="100" y="582" font-size="16" fill="#e2e8f0">Deposit before meetup</text><text x="760" y="582" text-anchor="end" font-size="16" font-weight="700" fill="#fb7185">33%</text><rect x="100" y="596" width="640" height="14" rx="7" fill="#1f2937"/><rect x="100" y="596" width="211" height="14" rx="7" fill="#fb7185"/><text x="100" y="642" font-size="16" fill="#e2e8f0">Counterfeit item</text><text x="760" y="642" text-anchor="end" font-size="16" font-weight="700" fill="#fb7185">28%</text><rect x="100" y="656" width="640" height="14" rx="7" fill="#1f2937"/><rect x="100" y="656" width="179" height="14" rx="7" fill="#fb7185"/><text x="100" y="702" font-size="16" fill="#e2e8f0">Off-platform migration</text><text x="760" y="702" text-anchor="end" font-size="16" font-weight="700" fill="#fb7185">16%</text><rect x="100" y="716" width="640" height="14" rx="7" fill="#1f2937"/><rect x="100" y="716" width="102" height="14" rx="7" fill="#fb7185"/><rect x="860" y="352" width="432" height="194" rx="24" fill="#111827" stroke="#334155"/><text x="890" y="388" font-size="24" font-weight="700" fill="#f8fafc">Resistance is building</text><text x="890" y="420" font-size="52" font-weight="800" fill="#f8fafc">22</text><text x="958" y="420" font-size="20" fill="#94a3b8">pts lower</text><text x="890" y="454" font-size="16" fill="#cbd5e1">Players fall for 44% of scams on their first encounters,</text><text x="890" y="478" font-size="16" fill="#cbd5e1">dropping to 22% by their later ones — the inoculation works.</text><rect x="860" y="560" width="432" height="194" rx="24" fill="#111827" stroke="#334155"/><text x="890" y="596" font-size="24" font-weight="700" fill="#f8fafc">Most-missed red flags</text><text x="890" y="628" font-size="15" fill="#e2e8f0">Asked for deposit before meetup</text><text x="1248" y="628" text-anchor="end" font-size="14" font-weight="700" fill="#f8fafc">62%</text><rect x="890" y="638" width="358" height="10" rx="5" fill="#1f2937"/><rect x="890" y="638" width="222" height="10" rx="5" fill="#f59e0b"/><text x="890" y="670" font-size="15" fill="#e2e8f0">Claimed “official” secure link</text><text x="1248" y="670" text-anchor="end" font-size="14" font-weight="700" fill="#f8fafc">55%</text><rect x="890" y="680" width="358" height="10" rx="5" fill="#1f2937"/><rect x="890" y="680" width="197" height="10" rx="5" fill="#f59e0b"/><text x="890" y="712" font-size="15" fill="#e2e8f0">Too-good-to-be-true luxury price</text><text x="1248" y="712" text-anchor="end" font-size="14" font-weight="700" fill="#f8fafc">41%</text><rect x="890" y="722" width="358" height="10" rx="5" fill="#1f2937"/><rect x="890" y="722" width="147" height="10" rx="5" fill="#f59e0b"/></svg>
